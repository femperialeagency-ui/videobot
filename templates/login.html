<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VideoBot — Connexion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #05060A; --surface: #0D1018; --border: rgba(255,255,255,.08);
      --border-strong: rgba(255,255,255,.14);
      --accent: #7C5CFF; --accent2: #2F6BFF; --text: #F0F1F7;
      --muted: #8B92A8; --error: #f87171; --radius: 14px;
      --glass: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015));
      --shadow-card: 0 10px 36px rgba(0,0,0,.40);
      --shadow-glow: 0 0 0 1px rgba(124,92,255,.14), 0 16px 46px rgba(124,92,255,.12);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(1100px 560px at 20% -10%, rgba(124,92,255,.18), transparent 60%),
        radial-gradient(900px 520px at 100% 100%, rgba(47,107,255,.13), transparent 55%),
        var(--bg);
      color: var(--text); min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; }
    .card { background: var(--glass), var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 36px; width: 100%; max-width: 380px;
      box-shadow: var(--shadow-card), var(--shadow-glow); backdrop-filter: blur(20px); }
    .logo { text-align: center; font-size: 1.7rem; margin-bottom: 6px; }
    h1 { font-size: 1.5rem; font-weight: 800; text-align: center; margin-bottom: 6px; letter-spacing: -.01em;
      background: linear-gradient(135deg, #fff, var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    p.sub { color: var(--muted); text-align: center; font-size: 0.85rem; margin-bottom: 26px; }
    label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--muted); margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: .04em; }
    input[type="text"], input[type="password"] {
      width: 100%; background: rgba(255,255,255,.025); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); padding: 12px 14px; font-size: 0.95rem; outline: none;
      transition: border-color .2s, background .2s; }
    input[type="text"]:focus, input[type="password"]:focus { border-color: var(--accent); background: rgba(124,92,255,.06); }
    button { width: 100%; margin-top: 20px; padding: 13px 14px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-size: 0.95rem;
      font-weight: 700; cursor: pointer; transition: filter .2s, transform .2s;
      box-shadow: 0 10px 28px rgba(124,92,255,.34); }
    button:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .error { margin-top: 16px; padding: 11px 13px; border-radius: 10px; font-size: 0.82rem;
      background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.32); color: var(--error); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🎬</div>
    <h1>VideoBot</h1>
    <p class="sub">Accès protégé — connectez-vous avec votre compte.</p>
    <form method="POST" action="{{ url_for('login') }}">
      <label for="email">Email</label>
      <input type="text" id="email" name="email" autofocus required autocomplete="username" style="margin-bottom:18px;" />
      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />
      <button type="submit">Se connecter</button>
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
    </form>
  </div>
</body>
</html>
