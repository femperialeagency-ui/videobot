<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VideoBot — Connexion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13; --surface: #1a1a24; --border: #2e2e42;
      --accent: #7c5cfc; --accent2: #a78bfa; --text: #e8e8f0;
      --muted: #8888aa; --error: #f87171; --radius: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px; width: 100%; max-width: 360px; }
    h1 { font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: 6px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    p.sub { color: var(--muted); text-align: center; font-size: 0.85rem; margin-bottom: 22px; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--accent2); margin-bottom: 8px; }
    input[type="password"] { width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 11px 12px; font-size: 0.95rem; outline: none;
      transition: border-color .2s; }
    input[type="password"]:focus { border-color: var(--accent); }
    button { width: 100%; margin-top: 16px; padding: 11px 12px; border: none; border-radius: 8px;
      background: var(--accent); color: #fff; font-size: 0.92rem; font-weight: 600; cursor: pointer;
      transition: background .2s; }
    button:hover { background: var(--accent2); }
    .error { margin-top: 14px; padding: 10px 12px; border-radius: 8px; font-size: 0.82rem;
      background: rgba(248,113,113,.12); border: 1px solid rgba(248,113,113,.35); color: var(--error); }
  </style>
</head>
<body>
  <div class="card">
    <h1>VideoBot</h1>
    <p class="sub">Accès protégé — connectez-vous avec votre compte.</p>
    <form method="POST" action="{{ url_for('login') }}">
      <label for="email">Email</label>
      <input type="text" id="email" name="email" autofocus required autocomplete="username" style="margin-bottom:16px;" />
      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />
      <button type="submit">Se connecter</button>
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
    </form>
  </div>
</body>
</html>
