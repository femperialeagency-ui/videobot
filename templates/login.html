<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ViralScale — Connexion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #05060A; --surface: #0D1018; --border: rgba(255,255,255,.08);
      --border-strong: rgba(255,255,255,.14);
      --accent: #7C5CFF; --accent2: #2F6BFF; --accent3: #FF4DDF; --text: #F0F1F7;
      --muted: #8B92A8; --error: #f87171; --radius: 14px;
      --glass: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015));
      --shadow-card: 0 10px 36px rgba(0,0,0,.40);
      --shadow-glow: 0 0 0 1px rgba(124,92,255,.14), 0 16px 46px rgba(124,92,255,.12);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(1100px 560px at 20% -10%, rgba(124,92,255,.18), transparent 60%),
        radial-gradient(900px 520px at 100% 100%, rgba(47,107,255,.13), transparent 55%),
        var(--bg);
      color: var(--text); min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; }
    .frame { width: 100%; max-width: 380px; display: flex; flex-direction: column; align-items: center; }
    .vs-badge { display: inline-flex; align-items: center; gap: 7px; padding: 6px 14px 6px 8px; margin-bottom: 22px;
      border-radius: 999px; background: var(--glass), rgba(255,255,255,.02); border: 1px solid var(--border);
      font-size: 0.74rem; font-weight: 700; color: var(--muted); letter-spacing: .03em; backdrop-filter: blur(12px); }
    .vs-badge .dot { width: 7px; height: 7px; border-radius: 50%;
      background: linear-gradient(120deg, var(--accent2), var(--accent), var(--accent3));
      box-shadow: 0 0 10px rgba(124,92,255,.7); }
    .card { position: relative; background: var(--glass), var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 36px; width: 100%;
      box-shadow: var(--shadow-card), var(--shadow-glow); backdrop-filter: blur(20px);
      transition: transform .3s ease, box-shadow .3s ease, border-color .3s ease; overflow: hidden; }
    .card::before { content: ""; position: absolute; inset: 0; pointer-events: none; opacity: .55;
      background: radial-gradient(420px 160px at 50% -20%, rgba(124,92,255,.16), transparent 70%); }
    .card:hover { transform: translateY(-2px); border-color: rgba(124,92,255,.26);
      box-shadow: var(--shadow-card), 0 0 0 1px rgba(124,92,255,.2), 0 22px 56px rgba(124,92,255,.16); }
    .vs-logo-mark { display: flex; align-items: center; justify-content: center; margin-bottom: 14px; position: relative; z-index: 1; }
    .vs-logo-mark svg { width: 46px; height: 46px; filter: drop-shadow(0 6px 18px rgba(124,92,255,.45)); }
    h1 { position: relative; z-index: 1; font-size: 1.5rem; font-weight: 800; text-align: center; margin-bottom: 6px; letter-spacing: -.01em;
      background: linear-gradient(115deg, #fff 18%, var(--accent2) 58%, var(--accent3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    p.sub { position: relative; z-index: 1; color: var(--muted); text-align: center; font-size: 0.85rem; margin-bottom: 26px; line-height: 1.5; }
    form { position: relative; z-index: 1; }
    label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--muted); margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: .04em; }
    input[type="text"], input[type="password"] {
      width: 100%; background: rgba(255,255,255,.025); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); padding: 12px 14px; font-size: 0.95rem; outline: none;
      transition: border-color .2s ease, background .2s ease, box-shadow .2s ease; }
    input[type="text"]:focus, input[type="password"]:focus { border-color: var(--accent); background: rgba(124,92,255,.06);
      box-shadow: 0 0 0 4px rgba(124,92,255,.14); }
    button { width: 100%; margin-top: 20px; padding: 13px 14px; border: none; border-radius: 10px;
      background: linear-gradient(120deg, var(--accent2), var(--accent), var(--accent3)); color: #fff; font-size: 0.95rem;
      font-weight: 700; cursor: pointer; transition: filter .2s ease, transform .2s ease, box-shadow .2s ease;
      box-shadow: 0 10px 28px rgba(124,92,255,.34); }
    button:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 14px 36px rgba(124,92,255,.42); }
    button:active { transform: translateY(0); }
    .error { margin-top: 16px; padding: 11px 13px; border-radius: 10px; font-size: 0.82rem;
      background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.32); color: var(--error); }
    .foot-note { margin-top: 18px; text-align: center; font-size: 0.74rem; color: var(--muted); opacity: .8;
      display: inline-flex; align-items: center; gap: 6px; }
    .foot-note svg { flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="frame">
    <span class="vs-badge"><span class="dot"></span> Espace agences &amp; créateurs</span>
    <div class="card">
      <div class="vs-logo-mark">
        <svg viewBox="0 0 36 36" aria-hidden="true">
          <defs><linearGradient id="vsGradLogin" x1="0" y1="1" x2="1" y2="0">
            <stop offset="0%" stop-color="#2F6BFF"/><stop offset="50%" stop-color="#7C5CFF"/><stop offset="100%" stop-color="#FF4DDF"/>
          </linearGradient></defs>
          <path d="M3 6 L13 27 L16.5 20 L9 6 Z" fill="#fff"/>
          <path d="M22.5 6 L16.5 20 L18.5 24.5 L30 6 Z" fill="#fff" opacity=".5"/>
          <path d="M14.5 19.5 L29 5 L29 13 L18.5 23.5 Z" fill="url(#vsGradLogin)"/>
        </svg>
      </div>
      <h1>ViralScale</h1>
      <p class="sub">Accès protégé — connectez-vous avec votre compte pour piloter vos générations.</p>
      <form method="POST" action="{{ url_for('login') }}">
        <label for="email">Email</label>
        <input type="text" id="email" name="email" autofocus required autocomplete="username" style="margin-bottom:18px;" />
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
        <button type="submit">Se connecter</button>
        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}
      </form>
    </div>
    <p class="foot-note"><svg width="13" height="13" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="8" width="10" height="7.5" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M6 8 V5.6 a3 3 0 0 1 6 0 V8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="9" cy="11.6" r="1.05" fill="currentColor"/></svg> Connexion chiffrée · ViralScale Studio</p>
  </div>
</body>
</html>
